<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" aria-label="Worth Protecting mark">
  <!-- Shield outer -->
  <path d="M 30 24
           L 210 24
           Q 218 24 220 36
           L 220 140
           Q 220 222 120 270
           Q 20 222 20 140
           L 20 36
           Q 22 24 30 24 Z"
        fill="none" stroke="#143d22" stroke-width="3" stroke-linejoin="round"/>
  <!-- Shield inner border -->
  <path d="M 40 38
           L 200 38
           Q 206 38 208 48
           L 208 140
           Q 208 212 120 254
           Q 32 212 32 140
           L 32 48
           Q 34 38 40 38 Z"
        fill="none" stroke="#1e5631" stroke-width="1.1"/>
  <!-- Key heart bow -->
  <path d="M 120 128
           C 102 128 86 112 86 94
           C 86 78 104 74 120 92
           C 136 74 154 78 154 94
           C 154 112 138 128 120 128 Z"
        fill="none" stroke="#143d22" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- Heart inner accent -->
  <path d="M 120 116
           C 108 116 98 106 98 96
           C 98 86 110 86 120 96
           C 130 86 142 86 142 96
           C 142 106 132 116 120 116 Z"
        fill="none" stroke="#2d7a47" stroke-width="0.8" opacity="0.8"/>
  <!-- Key shaft -->
  <line x1="120" y1="128" x2="120" y2="222" stroke="#143d22" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Key teeth (bits) — right side -->
  <path d="M 120 196 L 140 196 L 140 204 L 120 204"
        fill="none" stroke="#143d22" stroke-width="2.2" stroke-linejoin="miter"/>
  <path d="M 120 210 L 134 210 L 134 218 L 120 218"
        fill="none" stroke="#143d22" stroke-width="2.2" stroke-linejoin="miter"/>
  <!-- Tiny flourishes — filigree corners -->
  <path d="M 52 44 Q 60 44 62 52" fill="none" stroke="#2d7a47" stroke-width="0.7" opacity="0.7"/>
  <path d="M 188 44 Q 180 44 178 52" fill="none" stroke="#2d7a47" stroke-width="0.7" opacity="0.7"/>
</svg>
