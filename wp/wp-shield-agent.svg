<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" role="img" aria-label="Worth Protecting — agent edition seal">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.2" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="rimBevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7affb0"/>
      <stop offset="45%" stop-color="#3eff7c"/>
      <stop offset="100%" stop-color="#00b858"/>
    </linearGradient>
    <path id="shieldShape" d="M 20 20 L 200 20 L 200 115 Q 200 190 110 225 Q 20 190 20 115 Z"/>
  </defs>

  <!-- Shield bevel rim (glowing, wide stroke) -->
  <use href="#shieldShape" fill="#000000" stroke="url(#rimBevel)" stroke-width="10" stroke-linejoin="round" filter="url(#neonGlow)"/>

  <!-- Inner bevel highlight -->
  <path d="M 27 27 L 193 27 L 193 114 Q 193 185 110 217 Q 27 185 27 114 Z"
        fill="none" stroke="#7affb0" stroke-width="1.2" opacity="0.55"/>

  <!-- Key — heart bow + shaft + ward teeth as single stroked silhouette -->
  <g filter="url(#neonGlow)">
    <path d="M 110 78
             C 110 62, 82 58, 74 72
             C 66 90, 88 108, 106 124
             L 106 186
             L 114 186
             L 114 180
             L 132 180
             L 132 171
             L 114 171
             L 114 164
             L 127 164
             L 127 155
             L 114 155
             L 114 124
             C 132 108, 154 90, 146 72
             C 138 58, 110 62, 110 78 Z"
          fill="none" stroke="#3eff7c" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
